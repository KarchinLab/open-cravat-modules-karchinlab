datasource: NCG7.2
description: The Network of Cancer Genes (NCG) is a curated, open-access 
  resource that collects genes whose somatic alterations are reported to 
  drive either cancer evolution or clonal expansion in non-cancer tissues. 
  In addition to driver-gene labels, NCG annotates a broad set of gene systems-level 
  properties including duplicability, evolutionary origin, expression breadth, 
  essentiality, protein-network topology, miRNA regulation, and germline constraint.
